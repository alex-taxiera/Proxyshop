name: Build on Push to Main

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install msvc-runtime poetry poetry-plugin-shell
          poetry install

      - name: Copy static files
        run: |
          cp -r fonts ./dist/fonts
          cp -r plugins ./dist/plugins
          cp README.md LICENSE.md pyproject.toml ./dist
          cp src/data ./dist/src/data
          cp src/img ./dist/src/img

      - name: Run Build
        run: |
          poetry env activate
          pyinstaller -n Proxyshop --onefile main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          path: ./dist/
          name: Proxyshop-dev-{{ github.run_number }}
